defaults:
  - base
  - _self_

project: text2semantic_grpo
max_length: 4096
pretrained_ckpt_path: checkpoints/s2-pro
sft_adapter_ckpt_path: results/korean_s2_pro_sft_r8_alpha16/checkpoints/step_000000001.ckpt
sft_adapter_ckpt_sha256: ???
provenance_manifest_sha256: ???
base_revision: 1de9996b6be38b745688de084d87a5633f714e4e

trainer:
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  gradient_clip_algorithm: "norm"
  max_steps: 10000
  precision: bf16-true
  limit_val_batches: 0
  val_check_interval: 100
  log_every_n_steps: 1

tokenizer:
  _target_: fish_speech.tokenizer.FishTokenizer
  model_path: ${pretrained_ckpt_path}

train_dataset:
  _target_: fish_speech.datasets.semantic.AutoTextSemanticInstructionIterableDataset
  proto_files:
    - data/protos/train
  tokenizer: ${tokenizer}
  causal: true
  max_length: ${max_length}
  use_speaker: false
  interactive_prob: 0.7

val_dataset:
  _target_: fish_speech.datasets.semantic.AutoTextSemanticInstructionIterableDataset
  proto_files:
    - data/protos/dev
  tokenizer: ${tokenizer}
  causal: true
  max_length: ${max_length}
  use_speaker: false
  interactive_prob: 0.7

data:
  _target_: fish_speech.datasets.semantic.SemanticDataModule
  train_dataset: ${train_dataset}
  val_dataset: ${val_dataset}
  num_workers: 1
  batch_size: 1
  tokenizer: ${tokenizer}
  max_length: ${max_length}

model:
  _target_: fish_speech.models.text2semantic.grpo_module.TextToSemanticGRPO
  model:
    _target_: fish_speech.models.text2semantic.llama.BaseTransformer.from_pretrained
    path: ${pretrained_ckpt_path}
    load_weights: true
    max_length: ${max_length}
    lora_config:
      _target_: fish_speech.models.text2semantic.lora.LoraConfig
      r: 8
      lora_alpha: 16
      lora_dropout: 0
  sft_adapter_ckpt_path: ${sft_adapter_ckpt_path}
  sft_adapter_ckpt_sha256: ${sft_adapter_ckpt_sha256}
  provenance_manifest_sha256: ${provenance_manifest_sha256}
  base_revision: ${base_revision}
  group_size: 2
  max_new_tokens: 64
  eos_token_id: 151645
  rollout_seed: 1234
  kl_weight: 0.1
  mechanics_smoke: false
  allow_unvalidated_reward: false
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1e-5
    weight_decay: 0
    betas: [0.9, 0.95]
    eps: 1e-5
  lr_scheduler:
    _target_: torch.optim.lr_scheduler.LambdaLR
    _partial_: true
    lr_lambda:
      _target_: fish_speech.scheduler.get_constant_schedule_with_warmup_lr_lambda
      _partial_: true
      num_warmup_steps: 10

callbacks:
  model_checkpoint:
    every_n_train_steps: ${trainer.val_check_interval}
